<!DOCTYPE html>
<html lang="en">

<head>
<link rel="icon" href="favicon.ico">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Uber Engine</title>

<link rel="stylesheet" href="css/styles.css">

</head>


<body>

<div class="app">

<h1>Uber Engine</h1>


<!-- TABS -->

<div class="tabs">

<button class="tab-btn active" data-tab="dashboard">Dashboard</button>
<button class="tab-btn" data-tab="shifts">Shifts</button>
<button class="tab-btn" data-tab="fuel">Fuel</button>

</div>



<!-- DASHBOARD -->

<div id="dashboard" class="tab-page active">

<div class="card">

<h3>Monthly Overview</h3>

<div class="metrics">

<div class="metric">
<div class="metric-label">Income</div>
<div id="metric-income" class="metric-value">£0</div>
</div>

<div class="metric">
<div class="metric-label">Fuel</div>
<div id="metric-fuel" class="metric-value">£0</div>
</div>

<div class="metric">
<div class="metric-label">Profit</div>
<div id="metric-profit" class="metric-value">£0</div>
</div>

<div class="metric">
<div class="metric-label">Tax</div>
<div id="metric-tax" class="metric-value">£0</div>
</div>

<div class="metric">
<div class="metric-label">Net Income</div>
<div id="metric-retained" class="metric-value">£0</div>
</div>

<div class="metric">
<div class="metric-label">Miles</div>
<div id="metric-miles" class="metric-value">0</div>
</div>

<div class="metric">
<div class="metric-label">£ / Mile</div>
<div id="metric-per-mile" class="metric-value">£0</div>
</div>

<div class="metric">
<div class="metric-label">£ / Hour</div>
<div id="metric-per-hour" class="metric-value">£0</div>
</div>

</div>

</div>

</div>



<!-- SHIFTS -->

<div id="shifts" class="tab-page">

<div class="card">

<h3>Shifts</h3>

<form id="shift-form">

<input id="shift-date" type="date" required>

<div class="time-row">

<select id="shift-start-hour" required>

<option value="" disabled selected>Start Hour</option>

<option value="00">00</option>
<option value="01">01</option>
<option value="02">02</option>
<option value="03">03</option>
<option value="04">04</option>
<option value="05">05</option>
<option value="06">06</option>
<option value="07">07</option>
<option value="08">08</option>
<option value="09">09</option>
<option value="10">10</option>
<option value="11">11</option>
<option value="12">12</option>
<option value="13">13</option>
<option value="14">14</option>
<option value="15">15</option>
<option value="16">16</option>
<option value="17">17</option>
<option value="18">18</option>
<option value="19">19</option>
<option value="20">20</option>
<option value="21">21</option>
<option value="22">22</option>
<option value="23">23</option>

</select>

<select id="shift-start-min" required>

<option value="" disabled selected>Start Min</option>

<option value="00">00</option>
<option value="15">15</option>
<option value="30">30</option>
<option value="45">45</option>

</select>

</div>



<div class="time-row">

<select id="shift-end-hour" required>

<option value="" disabled selected>End Hour</option>

<option value="00">00</option>
<option value="01">01</option>
<option value="02">02</option>
<option value="03">03</option>
<option value="04">04</option>
<option value="05">05</option>
<option value="06">06</option>
<option value="07">07</option>
<option value="08">08</option>
<option value="09">09</option>
<option value="10">10</option>
<option value="11">11</option>
<option value="12">12</option>
<option value="13">13</option>
<option value="14">14</option>
<option value="15">15</option>
<option value="16">16</option>
<option value="17">17</option>
<option value="18">18</option>
<option value="19">19</option>
<option value="20">20</option>
<option value="21">21</option>
<option value="22">22</option>
<option value="23">23</option>

</select>

<select id="shift-end-hour" required>

<option value="" disabled selected>End Hour</option>

<option value="00">00</option>
<option value="01">01</option>
<option value="02">02</option>
<option value="03">03</option>
<option value="04">04</option>
<option value="05">05</option>
<option value="06">06</option>
<option value="07">07</option>
<option value="08">08</option>
<option value="09">09</option>
<option value="10">10</option>
<option value="11">11</option>
<option value="12">12</option>
<option value="13">13</option>
<option value="14">14</option>
<option value="15">15</option>
<option value="16">16</option>
<option value="17">17</option>
<option value="18">18</option>
<option value="19">19</option>
<option value="20">20</option>
<option value="21">21</option>
<option value="22">22</option>
<option value="23">23</option>

</select>

</div>

<div class="earnings-grid">

<input
id="shift-odo-start"
type="number"
placeholder="Odometer Start"
min="0"
step="1"
required
>

<input
id="shift-odo-end"
type="number"
placeholder="Odometer End"
min="0"
step="1"
required
>

<input
id="shift-gross"
type="number"
placeholder="Uber Earnings (£)"
min="0"
step="0.01"
>

<input
id="shift-tips"
type="number"
placeholder="Tips (£)"
min="0"
step="0.01"
>

</div>

</form>



<button type="submit">Add Shift</button>

</form>

<h4 style="margin-top:20px;">Shift History</h4>

<div id="shift-history"></div>

</div>

</div>



<!-- FUEL -->

<div id="fuel" class="tab-page">

<div class="card">

<h3>Fuel</h3>

<form id="fuel-form">

<div class="form-row">
<input type="date" id="fuel-date" required>
<input type="text" id="fuel-station" placeholder="Station">
</div>

<div class="form-row">
<input type="number" id="fuel-litres" placeholder="Litres">
<input type="number" id="fuel-cost" placeholder="Cost (£)">
</div>

<div class="form-row">
<input type="number" id="fuel-miles" placeholder="Miles">
</div>

<button class="primary">Add Fuel</button>

</form>

<h4 style="margin-top:20px;">Fuel History</h4>

<div id="fuel-history"></div>

</div>

</div>


<div class="app-version" id="app-version"></div>

</div>


<script type="module" src="js/app.js?v=1.0.1"></script>

</body>

</html>
